name: Build Flyer Report

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node依存インストール
        run: npm install

      - name: Python依存インストール
        run: pip install -r requirements.txt

      - name: チラシダウンロード
        run: node scrape_flyers.js

      - name: OCR実行
        run: |
          python find_flyer_keywords_v5.py flyer_images \
            --keywords flyer_keywords_v3.yaml \
            --output-dir keyword_output_v5
        env:
          OCRSPACE_API_KEY: ${{ secrets.OCRSPACE_API_KEY }}

      - name: レポート生成
        run: python generate_flyer_keyword_report_v4.py keyword_output_v5

      - name: Pages用フォルダ作成
        run: |
          mkdir public
          cp keyword_output_v5/flyer_keyword_report.html public/index.html

      - name: GitHub Pagesへデプロイ
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public